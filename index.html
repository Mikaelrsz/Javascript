<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

    <section>
        <div>
            <p>
                <label for="ano">Ano de Nascimento: </label>
                <input type="number" id="ano" min="1900" max="2026" value="2000">
            </p>
            <p>
                <label>Sexo: </label>
                <input type="radio" name="sexo" id="mas" checked>
                <label for="mas">Masculino</label>
                <input type="radio" name="sexo" id="fem">
                <label for="fem">Feminino</label>
            </p>
            <p>
                <input type="button" value="Verificar" onclick="verificar()">
            </p>
        </div>
        
        <div id="res">
            Preencha os dados acima e clique em Verificar!
        </div>
    </section>

    <footer>
        <p>&copy; Curso em Vídeo - Gustavo Guanabara</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
